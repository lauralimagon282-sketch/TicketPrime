<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TicketPrime - Sua Próxima Experiência</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* CSS Otimizado - MANTIDO EXATAMENTE IGUAL */
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; margin: 0; }
        
        .navbar { 
            background: #0f0c29; padding: 15px 50px; 
            display: flex; justify-content: space-between; align-items: center;
            color: white; position: sticky; top: 0; z-index: 100;
        }

        .btn-nav { background: none; border: 1px solid #ffffff33; color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; margin-left: 10px; }
        .btn-nav:hover { background: #ff4d6d; border-color: #ff4d6d; }

        .hero-cliente { 
            background: linear-gradient(rgba(15, 12, 41, 0.8), rgba(15, 12, 41, 0.8)), url('https://images.unsplash.com/photo-1459749411177-042180ce673c?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center;
            color: white; padding: 80px 20px; text-align: center;
        }

        .dashboard-container { padding: 40px; max-width: 1200px; margin: 0 auto; }
        .eventos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }

        .card-evento { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; border: 1px solid #eee; }
        .card-evento:hover { transform: translateY(-8px); }
        .card-img { width: 100%; height: 180px; object-fit: cover; }
        .card-corpo { padding: 20px; }
        .tag-categoria { background: #ffe5ec; color: #ff4d6d; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .preco { font-size: 20px; font-weight: bold; color: #28a745; }
        .btn-comprar { background: #0f0c29; color: white; padding: 10px 25px; border-radius: 8px; text-decoration: none; font-weight: bold; border:none; cursor:pointer; }
        
        .btn-metodo {
            background: #f1f2f6;
            border: 1px solid #dfe4ea;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: #2d3436;
            transition: 0.2s;
        }
        .btn-metodo.ativo { background: #2d2a4e !important; color: white !important; }
        .btn-metodo:hover { background: #2d2a4e; color: white; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="font-size: 22px; font-weight: bold;">TicketPrime</div>
        <div>
            <button class="btn-nav" onclick="abrirPerfil()">👤 Meu Perfil</button>
            <button class="btn-nav" onclick="abrirModalMeusIngressos()">🎟️ Meus Ingressos</button>
            <button class="btn-nav" onclick="logout()" style="border-color: #ff4d6d; color: #ff4d6d;">Sair</button>
        </div>
    </nav>

    <header class="hero-cliente">
        <h1 id="boasVindas">Olá, explorador!</h1>
        <p>Os melhores shows do Brasil em um só lugar.</p>
    </header>

    <div class="dashboard-container">
        <h2 style="color: #0f0c29; margin-bottom: 30px;">🔥 Shows em Destaque</h2>
        <div id="eventos-grid" class="eventos-grid">
            </div>
    </div>

    <div id="modalPagamento" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:999; justify-content:center; align-items:center;">
        <div class="modal-content" style="background:white; padding:25px; border-radius:15px; width:90%; max-width:500px; position:relative; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
            
            <span onclick="fecharPagamento()" style="position:absolute; top:15px; right:20px; cursor:pointer; font-size:24px; color:#666; z-index: 1000; padding: 5px;">&times;</span>
            
            <h2 style="margin-bottom:20px;">Finalizar Compra</h2>

            <div id="detalhes-show-pagamento" style="margin-bottom:20px; padding:15px; background:#f8f9fa; border-radius:10px; border:1px solid #eee;">
            </div>

            <div class="pagamento-metodos" style="display:flex; gap:10px; margin-bottom:20px;">
                <button type="button" onclick="mudarMetodo('pix')" class="btn-metodo" style="flex:1; padding:10px; cursor:pointer; border-radius:8px; border:1px solid #ddd; background:#fff;">Pix</button>
                <button type="button" onclick="mudarMetodo('cartao')" class="btn-metodo" style="flex:1; padding:10px; cursor:pointer; border-radius:8px; border:1px solid #ddd; background:#fff;">Cartão</button>
                <button type="button" onclick="mudarMetodo('boleto')" class="btn-metodo" style="flex:1; padding:10px; cursor:pointer; border-radius:8px; border:1px solid #ddd; background:#fff;">Boleto</button>
            </div>

            <div id="area-metodo" style="min-height: 150px; margin-bottom: 20px; border-top: 1px solid #eee; padding-top: 20px;">
                <p style="color:#888; text-align:center;">Selecione um método de pagamento acima.</p>
            </div>

            <div id="sessao-cupom" style="margin: 15px 0; padding: 15px; background: #f1f2f6; border-radius: 10px; border: 1px solid #dcdde1;">
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="input-cupom" placeholder="TEM UM CUPOM?" 
                           style="flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; text-transform: uppercase; font-size: 13px;">
                    <button type="button" onclick="aplicarCupom()" 
                            style="padding: 10px 15px; background: #2d2a4e; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 13px;">
                        Aplicar
                    </button>
                </div>
                <p id="msg-cupom" style="font-size: 12px; margin-top: 8px; display: none; font-weight: bold;"></p>
            </div>

            <button onclick="confirmarPagamento()" style="width:100%; padding:15px; background:#00b894; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer; font-size:16px; transition: 0.3s; margin-top:10px;">
                CONFIRMAR PAGAMENTO
            </button>
            
        </div>
    </div>

    <script>
        // ================= CONFIGURAÇÃO INICIAL =================
let descontoAtivo = 0;

// Centralizamos a busca do usuário para evitar erros de "null"
const getUsuarioLogado = () => JSON.parse(localStorage.getItem('usuarioLogado'));

const user = getUsuarioLogado();
if (!user) {
    window.location.href = 'index.html';
} else {
    // Exibe o primeiro nome do usuário no topo
    const nomeExibicao = user.Nome || user.nome || "Explorador";
    document.getElementById('boasVindas').innerText = `Olá, ${nomeExibicao.split(' ')[0]}! 👋`;
}

// Carregar shows ao abrir a página
window.onload = carregarShows;

// ================= FUNÇÕES DO HEADER =================
function abrirPerfil() {
    const usuario = getUsuarioLogado();
    if (!usuario) return;

    Swal.fire({
        title: 'Meu Perfil',
        html: `
            <div style="text-align: left; padding: 10px;">
                <p><strong>Nome:</strong> ${usuario.Nome || usuario.nome}</p>
                <p><strong>E-mail:</strong> ${usuario.Email || usuario.email}</p>
                <p><strong>CPF:</strong> ${usuario.Cpf || usuario.cpf}</p>
                <p><strong>Tipo de Conta:</strong> Cliente</p>
            </div>
        `,
        icon: 'info',
        confirmButtonColor: '#2d2a4e'
    });
}

function abrirModalMeusIngressos() {
    // Busca os ingressos salvos no LocalStorage (simulando histórico)
    const todosOsIngressos = JSON.parse(localStorage.getItem('meus_ingressos')) || [];
    const usuarioCorreto = getUsuarioLogado();

    if (!usuarioCorreto) {
        Swal.fire('Erro', 'Sua sessão expirou.', 'error');
        return;
    }

    const cpfUsuario = usuarioCorreto.Cpf || usuarioCorreto.cpf;
    // Filtra ingressos que pertencem a este CPF
    const compras = todosOsIngressos.filter(ing => ing.usuarioCpf === cpfUsuario);

    if (compras.length === 0) {
        Swal.fire({
            title: 'Meus Ingressos',
            text: 'Você ainda não possui ingressos nesta conta.',
            icon: 'info',
            confirmButtonColor: '#2d2a4e'
        });
        return;
    }

    let listaHTML = `
        <div style="max-height: 400px; overflow-y: auto; padding: 5px;">
            ${compras.map(ing => `
                <div style="display: flex; align-items: center; margin-bottom: 15px; padding: 15px; background: #ffffff; border-radius: 12px; text-align: left; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                    <div style="flex: 1;">
                        <strong style="font-size: 16px; color: #2d2a4e; display: block; margin-bottom: 4px;">${ing.nome}</strong>
                        <div style="font-size: 12px; color: #666; line-height: 1.6;">
                            <span>📅 Data Compra: ${ing.dataCompra}</span><br>
                            <span>💰 Valor Pago: ${ing.valor}</span><br>
                            <span style="color: #00b894; font-weight: bold;">✔ Ingresso Confirmado</span>
                        </div>
                    </div>
                </div>
            `).join('')}
        </div>
    `;

    Swal.fire({
        title: 'Seus Ingressos 🎟️',
        html: listaHTML,
        confirmButtonText: 'Fechar',
        confirmButtonColor: '#2d2a4e',
        width: '480px'
    });
}

function logout() {
    Swal.fire({
        title: 'Sair',
        text: "Deseja realmente encerrar sua sessão?",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d63031',
        confirmButtonText: 'Sim, sair!',
        cancelButtonText: 'Cancelar'
    }).then((result) => {
        if (result.isConfirmed) {
            localStorage.removeItem('usuarioLogado');
            window.location.href = 'index.html';
        }
    });
}

// ================= FUNÇÕES DA LOJA E COMPRA =================
async function carregarShows() {
    try {
        const res = await fetch('/api/eventos');
        const eventos = await res.json();
        const container = document.getElementById('eventos-grid'); 
        container.innerHTML = "";

        eventos.forEach(ev => {
            const dataFormatada = new Date(ev.dataEvento || ev.DataEvento).toLocaleString('pt-BR', { 
                dateStyle: 'short', timeStyle: 'short' 
            });

            container.innerHTML += `
                <div class="card-evento">
                    <img src="${ev.imagemURL || 'https://via.placeholder.com/500'}" class="card-img">
                    <div class="card-corpo">
                        <span class="tag-categoria">Música</span>
                        <h3>${ev.nome}</h3>
                        <p style="color:#666; font-size:14px;">
                            📅 ${dataFormatada}<br>
                            🎫 Capacidade: ${ev.capacidadeTotal}
                        </p>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                            <span class="preco">R$ ${Number(ev.precoPadrao).toFixed(2)}</span>
                            <button onclick="prepararCompra(event, ${ev.id})" class="btn-comprar">Comprar</button>
                        </div>
                    </div>
                </div>`;
        });
    } catch (err) { 
        console.error("Erro ao carregar vitrine:", err); 
    }
}

// Função para abrir o modal de pagamento com os dados do show
let eventoSelecionadoId = null;

function prepararCompra(event, id) {
    eventoSelecionadoId = id;
    const modal = document.getElementById('modalPagamento');
    modal.style.display = 'flex';

    const card = event.target.closest('.card-evento');
    const nomeShow = card.querySelector('h3').innerText;
    const precoShow = card.querySelector('.preco').innerText;

    document.getElementById('detalhes-show-pagamento').innerHTML = `
        <p><strong>Evento:</strong> <span id="nome-show-modal">${nomeShow}</span></p>
        <p><strong>Valor:</strong> <span id="valor-show-modal">${precoShow}</span></p>
    `;
    mudarMetodo('pix'); 
}

function fecharPagamento() {
    document.getElementById('modalPagamento').style.display = 'none';
    descontoAtivo = 0; 
}

// CORREÇÃO DO CUPOM: Busca a porcentagem correta da sua API
let cupomAplicado = false; 

async function aplicarCupom() {
    if (cupomAplicado) {
        Swal.fire('Aviso', 'Um cupom já foi aplicado.', 'info');
        return;
    }

    const input = document.getElementById('input-cupom');
    const msg = document.getElementById('msg-cupom');
    const valorModal = document.getElementById('valor-show-modal');
    const codigo = input.value.trim().toUpperCase();

    try {
        const res = await fetch(`/api/cupons/${codigo}`);
        if (!res.ok) throw new Error();
        
        const cupom = await res.json();
        const porcentagem = cupom.porcentagemDesconto || cupom.PorcentagemDesconto;
        
        // --- AQUI ESTÁ O SEGREDO PARA NÃO DAR 16 MIL ---
        
        // 1. Pegamos apenas o que é número e ponto/vírgula do texto "R$ 200.00"
        let textoPreco = valorModal.innerText.replace(/[^\d,.]/g, '').trim();
        
        // 2. Garantimos que o JavaScript entenda como número decimal real
        // Se o valor for "200.00", ele vira 200. Se for "200,00", ele vira 200.
        let valorBase = parseFloat(textoPreco.replace(',', '.'));

        // Validação extra: se o valorBase for NaN ou estranho, resetamos para o padrão
        if (isNaN(valorBase)) valorBase = 200; 

        const desconto = porcentagem / 100;
        const valorComDesconto = valorBase * (1 - desconto);

        // 3. Exibimos formatado corretamente (R$ 160,00)
        valorModal.innerText = `R$ ${valorComDesconto.toFixed(2).replace('.', ',')}`;
        
        // Feedback visual para o cliente
        msg.innerText = `Cupom ${codigo} aplicado! (${porcentagem}% OFF)`;
        msg.style.color = "#00b894";
        msg.style.display = "block";

        // Travas de segurança
        cupomAplicado = true;
        input.disabled = true;
        const btn = document.querySelector("button[onclick='aplicarCupom()']");
        if(btn) btn.disabled = true;

    } catch (err) {
        msg.innerText = "Cupom inválido.";
        msg.style.color = "#d63031";
        msg.style.display = "block";
    }
}

// CORREÇÃO DOS BOTÕES: Faz o conteúdo aparecer ao clicar
function mudarMetodo(tipo) {
    const area = document.getElementById('area-metodo');
    
    if (tipo === 'pix') {
        area.innerHTML = `
            <div style="text-align:center; padding: 10px;">
                <p style="font-size:12px; color:#666;">Escaneie o QR Code para pagar:</p>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=TicketPrimePago" style="display:block; margin: 0 auto;">
            </div>`;
    } else if (tipo === 'cartao') {
        area.innerHTML = `
            <div style="display:flex; flex-direction:column; gap:8px; padding:10px;">
                <select id="tipoCartao" style="width:100%; padding:8px; border-radius:5px; border:1px solid #ccc;">
                    <option value="credito">💳 Cartão de Crédito</option>
                    <option value="debito">💳 Cartão de Débito</option>
                </select>
                <input type="text" placeholder="Número do Cartão" style="width:100%; padding:8px;">
                <input type="text" placeholder="Nome Impresso no Cartão" style="width:100%; padding:8px;">
                <div style="display:flex; gap:5px;">
                    <input type="text" placeholder="MM/AA" style="width:50%; padding:8px;">
                    <input type="text" placeholder="CVV" style="width:50%; padding:8px;">
                </div>
                <input type="text" placeholder="CPF do Titular" style="width:100%; padding:8px;">
            </div>`;
    } else if (tipo === 'boleto') {
        area.innerHTML = `
            <div style="text-align:center; padding:20px; background:#f9f9f9; border-radius:8px; border: 1px dashed #ccc;">
                <p style="margin:0; font-weight:bold;">📄 Boleto Bancário</p>
                <p style="font-size:12px; color:#666;">O link para o boleto será gerado após confirmar.</p>
            </div>`;
    }
}

// ================= FUNÇÃO FINAL DE COMPRA (BANCO + LOCALSTORAGE) =================
async function confirmarPagamento() {
    const usuario = getUsuarioLogado();
    const nomeShow = document.getElementById('nome-show-modal').innerText;
    const valorTexto = document.getElementById('valor-show-modal').innerText;
    const valorFinal = parseFloat(valorTexto.replace('R$', '').replace(',', '.'));

    const payload = {
        UsuarioCpf: usuario.Cpf || usuario.cpf,
        EventoId: eventoSelecionadoId || 1,
        ValorFinalPago: valorFinal
    };

    // Exibe loading
    Swal.fire({ title: 'Processando...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

    try {
        // 1. SALVA NO BANCO (C#)
        const res = await fetch('/api/reservas', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (res.ok) {
            // 2. SALVA NO LOCALSTORAGE (Para aparecer em "Meus Ingressos" na hora)
            const novoIngresso = {
                nome: nomeShow,
                valor: valorTexto,
                usuarioCpf: usuario.Cpf || usuario.cpf,
                dataCompra: new Date().toLocaleDateString('pt-BR')
            };

            let compras = JSON.parse(localStorage.getItem('meus_ingressos')) || [];
            compras.push(novoIngresso);
            localStorage.setItem('meus_ingressos', JSON.stringify(compras));

            Swal.fire('Sucesso!', 'Compra realizada e salva no banco!', 'success').then(() => {
                fecharPagamento();
                abrirModalMeusIngressos();
            });
        } else {
            throw new Error();
        }
    } catch (error) {
        Swal.fire('Erro', 'Não foi possível salvar a reserva no banco.', 'error');
    }
}
        
        
        window.onload = carregarShows;
    </script>
</body>
</html>
